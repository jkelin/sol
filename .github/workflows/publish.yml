name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      release:
        description: Version increment to publish
        required: true
        type: choice
        options:
          - patch
          - minor

permissions:
  contents: read

jobs:
  publish-patch:
    name: Publish patch version
    if: github.actor == 'jkelin' && github.triggering_actor == 'jkelin' && github.ref == 'refs/heads/master' && inputs.release == 'patch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify
        run: bun run verify:ci
      - name: Set patch version
        run: bun scripts/prepare-release.ts patch
      - name: Publish packages
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run publish:packages

  publish-minor:
    name: Publish minor version
    if: github.actor == 'jkelin' && github.triggering_actor == 'jkelin' && github.ref == 'refs/heads/master' && inputs.release == 'minor'
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify
        run: bun run verify:ci
      - name: Set minor version
        run: bun scripts/prepare-release.ts minor
      - name: Publish packages
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run publish:packages
